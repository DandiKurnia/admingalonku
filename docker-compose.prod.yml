name: admingalonku

# Production compose file.
# Usage:  docker compose -f docker-compose.prod.yml up -d --build
#
# Notes:
# - Builds the full multi-stage Dockerfile (deps -> builder -> runner).
# - Resulting image is the minimal standalone runtime (~150 MB on Alpine).
# - No source/bind mounts — image is self-contained.
# - For public deployments, put a reverse proxy (nginx / caddy / traefik) in
#   front of port 3001 for TLS termination, rate limiting, etc.

services:
  app:
    image: dandikurnia/admingalonku:latest
    container_name: admingalonku-prod
    restart: unless-stopped
    env_file:
      - .env.production
    ports:
      - "3001:3001"
    environment:
      TZ: Asia/Jakarta
      NODE_ENV: production
      PORT: 3001
    healthcheck:
      test:
        - CMD
        - wget
        - --no-verbose
        - --tries=1
        - --spider
        - http://localhost:3001/
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    tmpfs:
      - /tmp
